<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高奢菁英 | 個人資產指揮中心 V11</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-ivory: #FDFCF8; --card-bg: #FFFFFF; --text-navy: #1A2436;
            --text-muted: #8A94A6; --accent-gold: #C5A059; --up-red: #D96B6B;
            --down-green: #549B7B; --shadow-soft: 0 16px 40px rgba(26, 36, 54, 0.04);
            --border-light: rgba(26, 36, 54, 0.05); --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-ivory); color: var(--text-navy); font-family: 'Inter', 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; padding-top: 80px; padding-bottom: 80px; }
        h1, h2, h3 { font-family: 'Noto Serif TC', serif; font-weight: 600; }
        .num { font-family: 'Inter', sans-serif; }
        .color-up { color: var(--up-red); } .color-down { color: var(--down-green); } .color-gold { color: var(--accent-gold); }
        
        .app-container { max-width: 480px; margin: 0 auto; padding: 24px 20px; position: relative; }

        .top-nav {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: 70px;
            background: rgba(253, 252, 248, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; display: flex; justify-content: space-around; align-items: center;
            border-bottom: 1px solid var(--border-light); box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .nav-item {
            text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500; 
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            transition: var(--transition-smooth); position: relative; padding: 10px 0; cursor: pointer;
        }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--text-navy); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: 0; left: 20%; width: 60%;
            height: 2px; background: var(--accent-gold); border-radius: 2px;
        }

        .hero-section { text-align: center; padding: 20px 0 30px; position: relative; transition: var(--transition-smooth); }
        .sync-btn-wrapper { position: absolute; top: -10px; right: 0; }
        .sync-btn { background: none; border: none; color: var(--accent-gold); font-size: 22px; cursor: pointer; transition: var(--transition-smooth); }
        .sync-btn.spin { animation: spin 1s linear infinite; opacity: 0.5; pointer-events: none; }
        .hero-title { font-size: 13px; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 8px; font-family: 'Noto Sans TC'; transition: var(--transition-smooth);}
        .hero-amount { font-size: 42px; font-weight: 700; letter-spacing: -1px; margin-bottom: 16px; display: flex; justify-content: center; align-items: baseline; gap: 4px;}
        .hero-amount .currency { font-size: 22px; color: var(--accent-gold); font-weight: 500;}
        .hero-sub-info { display: flex; justify-content: center; gap: 24px; font-size: 13px; }
        .hero-sub-info div { display: flex; flex-direction: column; }
        .hero-sub-info span { color: var(--text-muted); margin-bottom: 4px;}

        .card { background-color: var(--card-bg); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-soft); border: 1px solid var(--border-light); overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
        .card-title { font-size: 18px; margin-bottom: 4px; }
        .card-subtitle { font-size: 12px; color: var(--text-muted); }
        .card-value { font-size: 24px; font-weight: 600; margin-bottom: 4px; text-align: right;}
        .card-roi { font-size: 14px; font-weight: 500; text-align: right;}
        .card-footer-time { font-size: 11px; color: var(--text-muted); text-align: right; padding-top: 12px; border-top: 1px dashed var(--border-light); margin-top: 12px; }

        .list-container { max-height: 0; opacity: 0; overflow: hidden; transition: var(--transition-smooth); }
        .card.expanded .list-container { max-height: 2000px; opacity: 1; margin-top: 20px; border-top: 1px solid var(--border-light); padding-top: 16px; }
        .list-item { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; border-bottom: 1px solid var(--border-light); font-size: 14px; }
        .list-item:last-child { border-bottom: none; }
        .item-col { display: flex; flex-direction: column; gap: 4px;}
        .item-col.right { align-items: flex-end; }
        .item-main { font-weight: 600; }
        .item-sub { font-size: 12px; color: var(--text-muted); }

        #history-content { display: none; } 
        
        .history-controls { 
            display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 6px; margin-bottom: 16px; 
            justify-content: flex-start; padding-bottom: 4px;
            -ms-overflow-style: none; scrollbar-width: none; 
        }
        .history-controls::-webkit-scrollbar { display: none; } 
        
        .hero-btn { 
            white-space: nowrap; flex-shrink: 0; 
            background: var(--bg-ivory); color: var(--text-muted); border: 1px solid var(--border-light); 
            padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; 
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: var(--transition-smooth); 
        }
        .hero-btn:active { transform: scale(0.96); }
        .hero-btn.active-hero { 
            background: linear-gradient(135deg, #C5A059, #D4AF37); color: white; border-color: transparent;
            box-shadow: 0 4px 12px rgba(197, 160, 89, 0.3); 
        }
        .hero-btn.dark-btn { background: #3A4A63; color: white; border: none; }
        .hero-btn.dark-btn.active-hero { background: #1A2436; box-shadow: 0 4px 12px rgba(26, 36, 54, 0.3); }

        .history-grid { 
            display: grid; 
            grid-template-columns: 1.4fr 1.1fr 1.1fr 1.1fr 1.8fr 1.8fr; 
            gap: 4px; align-items: center; font-size: 12px; text-align: right; 
            padding: 14px 0; border-bottom: 1px solid var(--border-light); 
        }
        .history-grid:last-child { border-bottom: none; }
        .history-grid .col-name { text-align: left; font-weight: 600; font-size: 14px; }
        
        .progress-bar-container { width: 100%; background-color: var(--border-light); border-radius: 4px; height: 4px; margin-top: 10px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background-color: var(--accent-gold); width: 0%; transition: width 0.3s ease; }

        /* 調整持股模組 */
        #edit-content { display: none; }

        .edit-item { display: flex; align-items: center; gap: 10px; padding: 13px 0; border-bottom: 1px solid var(--border-light); }
        .edit-item:last-child { border-bottom: none; }
        .edit-symbol { font-weight: 700; font-size: 13px; width: 54px; color: var(--text-navy); letter-spacing: 0.3px; flex-shrink: 0; }
        .edit-inputs { display: flex; gap: 8px; flex: 1; }
        .edit-input-wrapper { display: flex; flex-direction: column; gap: 3px; flex: 1; }
        .edit-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
        .edit-input { width: 100%; border: 1.5px solid var(--border-light); border-radius: 8px; padding: 7px 9px; font-size: 13px; font-family: 'Inter', sans-serif; background: var(--bg-ivory); color: var(--text-navy); outline: none; transition: 0.2s; }
        .edit-input:focus { border-color: var(--accent-gold); background: #FFF; box-shadow: 0 0 0 3px rgba(197,160,89,0.08); }

        .btn-action-group { display: flex; gap: 6px; flex-shrink: 0; }

        .btn-save {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 10px;
            background: transparent; border: 1.5px solid var(--accent-gold);
            color: var(--accent-gold); font-size: 13px; cursor: pointer; transition: var(--transition-smooth);
        }
        .btn-save:hover { background: var(--accent-gold); color: white; }
        .btn-save:active { transform: scale(0.92); }

        .btn-del {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 10px;
            background: transparent; border: 1.5px solid rgba(26,36,54,0.08);
            color: #B0B8C8; font-size: 12px; cursor: pointer; transition: var(--transition-smooth);
        }
        .btn-del:hover { border-color: rgba(217,107,107,0.4); color: var(--up-red); background: rgba(217,107,107,0.05); }
        .btn-del:active { transform: scale(0.92); }

        .btn-add-stock {
            width: 100%; padding: 13px; border-radius: 12px;
            background: var(--text-navy); color: white;
            border: none; font-size: 13px; font-weight: 600;
            letter-spacing: 0.5px; cursor: pointer;
            margin-top: 12px; transition: var(--transition-smooth);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-add-stock:active { transform: scale(0.98); opacity: 0.9; }

        .btn-cash-update {
            flex-shrink: 0; padding: 8px 16px; border-radius: 10px;
            background: transparent; border: 1.5px solid var(--accent-gold);
            color: var(--accent-gold); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: var(--transition-smooth); letter-spacing: 0.3px;
        }
        .btn-cash-update:hover { background: var(--accent-gold); color: white; }
        .btn-cash-update:active { transform: scale(0.96); }

        /* 變更紀錄面板 */
        .changelog-panel { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-light); box-shadow: var(--shadow-soft); margin-bottom: 20px; overflow: hidden; }
        .changelog-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border-light); }
        .changelog-title { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 600; }
        .changelog-badge { background: var(--up-red); color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; min-width: 22px; text-align: center; }
        .changelog-badge.empty { background: #D0D5DF; }
        .changelog-empty { padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
        .changelog-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 20px; border-bottom: 1px solid var(--border-light); font-size: 13px; }
        .changelog-row:last-child { border-bottom: none; }
        .changelog-left { display: flex; align-items: center; gap: 10px; }
        .changelog-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; padding: 2px 7px; border-radius: 6px; }
        .tag-edit { background: rgba(197,160,89,0.12); color: var(--accent-gold); }
        .tag-add  { background: rgba(84,155,123,0.12); color: var(--down-green); }
        .tag-del  { background: rgba(217,107,107,0.12); color: var(--up-red); }
        .tag-cash { background: rgba(26,36,54,0.07); color: var(--text-navy); }
        .changelog-symbol { font-weight: 700; color: var(--text-navy); }
        .changelog-right { font-size: 12px; color: var(--text-muted); text-align: right; line-height: 1.6; }

        /* 雲端同步狀態列 */
        .cloud-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); padding: 10px 16px; background: var(--bg-ivory); border-radius: 12px; margin-bottom: 16px; border: 1px solid var(--border-light); }
        .cloud-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        .cloud-status.synced .dot { background: var(--down-green); }
        .cloud-status.syncing .dot { background: var(--accent-gold); animation: pulse 1s infinite; }
        .cloud-status.error .dot { background: var(--up-red); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .save-to-cloud-btn { width: 100%; padding: 14px; border-radius: 14px; background: linear-gradient(135deg, #1A2436, #2C3A50); color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: var(--transition-smooth); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .save-to-cloud-btn:active { transform: scale(0.98); }
        .save-to-cloud-btn:disabled { opacity: 0.5; pointer-events: none; }

        .toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: rgba(26, 36, 54, 0.9); backdrop-filter: blur(10px); color: white; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 500; transition: var(--transition-smooth); z-index: 9999; pointer-events: none; opacity: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .toast.show { bottom: 100px; opacity: 1; }

        .footer { text-align: center; font-size: 11px; color: #A0A5B1; margin-top: 40px; letter-spacing: 1px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-item active" onclick="navTo('dashboard', this)">
        <i class="fa-solid fa-house-chimney-window"></i>
        <span>資產概覽</span>
    </div>
    <div class="nav-item" onclick="navTo('records', this)">
        <i class="fa-solid fa-receipt"></i>
        <span>交易紀錄</span>
    </div>
    <div class="nav-item" onclick="navTo('history', this)">
        <i class="fa-solid fa-chart-line"></i>
        <span>歷史績效</span>
    </div>
    <div class="nav-item" onclick="navTo('edit', this)">
        <i class="fa-solid fa-sliders"></i>
        <span>調整持股</span>
    </div>
</nav>

<div class="app-container">
    <header class="hero-section">
        <div class="sync-btn-wrapper">
            <button class="sync-btn" id="syncBtn" onclick="refreshData()" title="重新整理">⟳</button>
        </div>
        <div class="hero-title" id="hero-main-title">總資產淨值</div>
        <div class="hero-amount"><span class="currency">NT$</span><span class="num" id="grand-total">0</span></div>
        <div class="hero-sub-info">
            <div><span>總投資成本</span><strong class="num" id="grand-cost">0</strong></div>
            <div><span>總報酬率</span><strong class="num color-up" id="grand-roi">+0.00%</strong></div>
        </div>
    </header>

    <main id="main-content">
        <div id="dashboard-content">
            <div class="card" id="card-tw" onclick="toggleCard('card-tw')">
                <div class="card-header">
                    <div class="card-title-group">
                        <h2 class="card-title">台股資產</h2>
                        <span class="card-subtitle">總成本 <span class="num" id="tw-cost">0</span></span>
                    </div>
                    <div>
                        <div class="card-value num" id="tw-net">0</div>
                        <div class="card-roi num color-up" id="tw-roi">+0.00%</div>
                    </div>
                </div>
                <div class="list-container" id="tw-list"></div>
                <div class="card-footer-time" id="tw-update-time">來源報價：連線中...</div>
            </div>

            <div class="card" id="card-us" onclick="toggleCard('card-us')">
                <div class="card-header">
                    <div class="card-title-group">
                        <h2 class="card-title">美股資產</h2>
                        <span class="card-subtitle">總成本 <span class="num" id="us-cost">0</span></span>
                    </div>
                    <div>
                        <div class="card-value num" id="us-net">0</div>
                        <div class="card-roi num color-up" id="us-roi">+0.00%</div>
                    </div>
                </div>
                <div class="list-container" id="us-list"></div>
                <div class="card-footer-time" id="us-update-time">來源報價：連線中...</div>
            </div>

            <div class="card">
                <div class="card-header" style="cursor: default; margin-bottom: 0;">
                    <div class="card-title-group">
                        <h2 class="card-title">現金資產</h2>
                        <span class="card-subtitle" id="exchange-rate-display">即時匯率 USD/TWD = ...</span>
                    </div>
                    <div>
                        <div class="card-value num" id="cash-total">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="history-content">
            <div class="history-controls">
                <button class="hero-btn" onclick="setHeroMode('d1Pct', this)">英雄榜(日漲幅)</button>
                <button class="hero-btn" onclick="setHeroMode('d1Profit', this)">英雄榜(日獲利)</button>
                <button class="hero-btn" onclick="setHeroMode('d22Profit', this)">英雄榜(月獲利)</button>
                <button class="hero-btn dark-btn active-hero" onclick="setHeroMode('default', this)">預設</button>
            </div>
            <div class="card">
                <div class="card-header" style="cursor: default; padding-bottom: 8px;">
                    <div class="card-title-group">
                        <h2 class="card-title">資產趨勢與獲利矩陣</h2>
                        <span class="card-subtitle" id="history-status">點擊載入歷史數據...</span>
                    </div>
                </div>
                <div class="progress-bar-container" id="history-progress-container">
                    <div class="progress-bar" id="history-progress"></div>
                </div>
                <div id="history-list-container">
                    <div style="text-align:center; padding: 30px; color:var(--text-muted); font-size: 13px;">正在等待引擎啟動...</div>
                </div>
            </div>
        </div>

        <div id="edit-content">
            <div class="cloud-status" id="cloud-status">
                <div class="dot"></div>
                <span id="cloud-status-text">尚未連線至 Google Sheets</span>
            </div>

            <div class="card">
                <div class="card-header" style="cursor: default; padding-bottom: 8px;">
                    <div class="card-title-group">
                        <h2 class="card-title">新增持股</h2>
                    </div>
                </div>
                <div class="edit-item" style="border:none; padding-bottom: 0;">
                    <div class="edit-inputs" style="margin:0; flex-wrap: nowrap;">
                        <div class="edit-input-wrapper" style="flex: 0.7;">
                            <span class="edit-label">市場</span>
                            <select id="add-market" class="edit-input" style="padding: 6px 8px;">
                                <option value="TW">TW</option>
                                <option value="US">US</option>
                            </select>
                        </div>
                        <div class="edit-input-wrapper" style="flex: 1.1;">
                            <span class="edit-label">代號</span>
                            <input type="text" id="add-symbol" class="edit-input" placeholder="ex: 2330">
                        </div>
                        <div class="edit-input-wrapper">
                            <span class="edit-label">股數</span>
                            <input type="number" id="add-shares" class="edit-input" placeholder="0" step="any">
                        </div>
                        <div class="edit-input-wrapper">
                            <span class="edit-label">成本</span>
                            <input type="number" id="add-cost" class="edit-input" placeholder="0" step="any">
                        </div>
                    </div>
                </div>
                <button class="btn-add-stock" onclick="addNewStock()">
                    <i class="fa-solid fa-plus" style="font-size:11px;"></i> 加入投資組合
                </button>
            </div>

            <div class="card">
                <div class="card-header" style="cursor: default; padding-bottom: 8px;">
                    <div class="card-title-group">
                        <h2 class="card-title">台股部位管理</h2>
                    </div>
                </div>
                <div id="edit-tw-list"></div>
            </div>

            <div class="card">
                <div class="card-header" style="cursor: default; padding-bottom: 8px;">
                    <div class="card-title-group">
                        <h2 class="card-title">美股部位管理</h2>
                    </div>
                </div>
                <div id="edit-us-list"></div>
            </div>

            <div class="card">
                <div class="card-header" style="cursor: default; padding-bottom: 8px;">
                    <div class="card-title-group">
                        <h2 class="card-title">現金水位調整</h2>
                    </div>
                </div>
                <div class="edit-item" style="border: none; padding-bottom: 0;">
                    <div class="edit-symbol">TWD</div>
                    <div class="edit-inputs">
                        <div class="edit-input-wrapper">
                            <span class="edit-label">總金額</span>
                            <input type="number" id="edit-cash-input" class="edit-input" value="0">
                        </div>
                    </div>
                    <button class="btn-cash-update" onclick="saveCash()">更新</button>
                </div>
            </div>

            <div class="changelog-panel" id="changelog-panel">
                <div class="changelog-header">
                    <span class="changelog-title">本次變更紀錄</span>
                    <span class="changelog-badge empty" id="changelog-badge">0</span>
                </div>
                <div id="changelog-body">
                    <div class="changelog-empty">尚無任何變更</div>
                </div>
            </div>

            <button class="save-to-cloud-btn" id="saveCloudBtn" onclick="saveToCloud()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                儲存全部變更至 Google Sheets
            </button>
        </div>
    </main>

    <div class="footer" id="last-update">資料載入中，請稍候...</div>
    <div id="toast" class="toast">更新成功</div>
</div>

<script>
    // ============================================================
    // 🌟 Google Apps Script API 網址
    // ============================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx0e_906blgd80-lI4cHRd3ieSZuROr37uFRxf9TgFfFDulPVWhEY7632AAlR1wSKZvXA/exec';
    // ============================================================

    const appData = {
        cash: 0,
        settings: { usdToTwd: 31.50 },
        twStocks: [], usStocks: [], history: [],
        totals: { grandNet: 0, grandCost: 0, stockNet: 0, stockCost: 0 },
        marketTime: { tw: null, us: null }
    };

    let twseDataMap = null;
    let isHistoryLoaded = false;
    let isDataInitialized = false;
    let currentHeroMode = 'default';
    let currentTab = 'dashboard';

    const formatMoney = (num) => num.toLocaleString('en-US', { maximumFractionDigits: 0 });
    const formatDecimal = (num) => num.toLocaleString('en-US', { maximumFractionDigits: 3 });
    const formatPercent = (num) => (num > 0 ? '+' : '') + num.toFixed(2) + '%';
    const getColorClass = (num) => num > 0 ? 'color-up' : (num < 0 ? 'color-down' : '');
    const sleep = ms => new Promise(r => setTimeout(r, ms));
    const formatUnixTime = (unixMs) => {
        if (!unixMs) return "依來源方最新收盤價";
        const d = new Date(unixMs);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    };

    async function loadFromGoogleSheets() {
        setCloudStatus('syncing', '正在從 Google Sheets 讀取資料...');
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            appData.twStocks = [];
            appData.usStocks = [];
            appData.cash = data.cash || 0;

            data.holdings.forEach(h => {
                const stockObj = {
                    symbol: h.symbol, shares: h.shares, costPrice: h.costPrice,
                    currentPrice: null, prevClose: null, isError: true
                };
                if (h.market === 'TW') appData.twStocks.push(stockObj);
                else if (h.market === 'US') appData.usStocks.push(stockObj);
            });

            isDataInitialized = true;
            setCloudStatus('synced', `已從 Google Sheets 載入 ${data.holdings.length} 筆持股`);
            return true;
        } catch(e) {
            setCloudStatus('error', '無法連線至 Google Sheets，請稍後再試');
            return false;
        }
    }

    async function saveToCloud() {
        const btn = document.getElementById('saveCloudBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
        setCloudStatus('syncing', '正在儲存至 Google Sheets...');

        const payload = {
            cash: appData.cash,
            holdings: [
                ...appData.twStocks.map(s => ({ market: 'TW', symbol: s.symbol, shares: s.shares, costPrice: s.costPrice })),
                ...appData.usStocks.map(s => ({ market: 'US', symbol: s.symbol, shares: s.shares, costPrice: s.costPrice }))
            ]
        };

        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.success) {
                setCloudStatus('synced', '✅ 已成功儲存至 Google Sheets');
                showToast('☁️ 已同步至 Google Sheets！');
                changelog.length = 0;
                renderChangelog();
            } else {
                throw new Error(result.error || '未知錯誤');
            }
        } catch(e) {
            setCloudStatus('error', '❌ 儲存失敗：' + e.message);
            showToast('❌ 儲存失敗，請再試一次');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 儲存全部變更至 Google Sheets';
        }
    }

            const data = await res.json();
            twseDataMap = {};

        } catch (e) { twseDataMap = {}; }
    }

    async function fetchHybridYahooQuotes(symbolsArray) {
        if(symbolsArray.length === 0) return {};
        const symbolsStr = symbolsArray.join(',');
        const ts = new Date().getTime(); 
        const batchUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbolsStr}&nocache=${ts}`;
        
        const proxies = [
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
        ];

        const priceMap = {};
        let batchSuccess = false;

        for (let proxyGen of proxies) {
            try {
                const response = await fetch(proxyGen(batchUrl));
                if (!response.ok) continue;
                const data = await response.json();
                const results = data.quoteResponse.result;
                if(results && results.length > 0) {
                    results.forEach(item => {
                        priceMap[item.symbol] = { 
                            price: item.regularMarketPrice, 
                            prevClose: item.regularMarketPreviousClose,
                            time: item.regularMarketTime * 1000 
                        };
                    });
                    batchSuccess = true; break;
                }
            } catch (err) { continue; }
        }

        if (batchSuccess) return priceMap;

        const fetchIndividual = async (symbol) => {
            const chartUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d&nocache=${ts}`;
            for (let proxyGen of proxies) {
                try {
                    const response = await fetch(proxyGen(chartUrl));
                    if (!response.ok) continue;
                    const data = await response.json();
                    const meta = data.chart.result[0].meta;
                    if (meta && meta.regularMarketPrice) {
                        priceMap[symbol] = { 
                            price: meta.regularMarketPrice, 
                            prevClose: meta.chartPreviousClose,
                            time: meta.regularMarketTime * 1000 
                        };
                        return;
                    }
                } catch(e) {}
            }
        };
        await Promise.all(symbolsArray.map(sym => fetchIndividual(sym)));
        return priceMap;
    }

    async function fetchPricesAndRender() {
        const symbolsToFetch = ['TWD=X']; 
        appData.twStocks.forEach(s => symbolsToFetch.push(`${s.symbol}.TW`));
        appData.usStocks.forEach(s => symbolsToFetch.push(s.symbol));

        const [_, yahooHybridData] = await Promise.all([
            loadTWSE(),
            fetchHybridYahooQuotes(symbolsToFetch)
        ]);

        if (yahooHybridData['TWD=X'] && yahooHybridData['TWD=X'].price) {
            appData.settings.usdToTwd = yahooHybridData['TWD=X'].price;
        }
        document.getElementById('exchange-rate-display').innerText = `即時匯率 USD/TWD = ${appData.settings.usdToTwd.toFixed(2)}`;

        appData.twStocks.forEach(stock => {
            const yfSymbol = `${stock.symbol}.TW`;
            const quote = yahooHybridData[yfSymbol];
            if (quote && quote.prevClose) stock.prevClose = quote.prevClose;

            if (twseDataMap && twseDataMap[stock.symbol]) {
                stock.currentPrice = Math.round(twseDataMap[stock.symbol] * 100) / 100;
                stock.isError = false;
            } else if (quote && quote.price) {
                stock.currentPrice = Math.round(quote.price * 100) / 100;
                stock.isError = false;
                appData.marketTime.tw = Math.max(appData.marketTime.tw || 0, quote.time);
            } else { stock.isError = true; }
        });

        appData.usStocks.forEach(stock => {
            const quote = yahooHybridData[stock.symbol];
            if (quote && quote.price) {
                stock.currentPrice = Math.round(quote.price * 1000) / 1000;
                stock.prevClose = quote.prevClose;
                stock.isError = false;
                appData.marketTime.us = Math.max(appData.marketTime.us || 0, quote.time);
            } else { stock.isError = true; }
        });

        renderApp();
        if(currentTab === 'edit') renderEditView();
    }

    function renderApp() {

        const exRate = appData.settings.usdToTwd;

        const renderList = (stocks, isUS) => stocks.map(s => {
            const cost = s.costPrice * s.shares;
            const net = (s.isError ? 0 : s.currentPrice) * s.shares;
            const profit = net - cost;
            const roi = s.isError ? 0 : (profit / cost) * 100;
            if (isUS) { usCostUSD += cost; usNetUSD += net; } else { twCost += cost; twNet += net; }
            const displayNet = isUS ? net * exRate : net;
            const displayProfit = isUS ? profit * exRate : profit;
            return `<div class="list-item">
                <div class="item-col"><span class="item-main">${s.symbol}</span><span class="item-sub">${formatDecimal(s.shares)} 股</span></div>

        document.getElementById('us-list').innerHTML = renderList(appData.usStocks, true);
        
        const twROI = twCost === 0 ? 0 : (twNet - twCost) / twCost * 100;

        const usROI = usCostNTD === 0 ? 0 : (usNetNTD - usCostNTD) / usCostNTD * 100;
        
        appData.totals.stockCost = twCost + usCostNTD;
        appData.totals.stockNet = twNet + usNetNTD;
        appData.totals.grandCost = appData.totals.stockCost;

        document.getElementById("us-roi").innerText = formatPercent(usROI);
        document.getElementById("us-roi").className = `card-roi num ${getColorClass(usROI)}`;
        
        let twTimeStr = appData.marketTime.tw ? formatUnixTime(appData.marketTime.tw) : '依證交所最新收盤價';

        document.getElementById('us-update-time').innerText = `來源報價：${appData.marketTime.us?formatUnixTime(appData.marketTime.us):'載入中'}`;
    }

    function toggleCard(id) { document.getElementById(id).classList.toggle('expanded'); }
    function animateValue(id, end) {
        const obj = document.getElementById(id);
        if(!obj) return;
        const start = parseInt(obj.innerText.replace(/,/g, '')) || 0;
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / 800, 1);
            const current = Math.floor((1 - Math.pow(1 - progress, 4)) * (end - start) + start);
            obj.innerText = formatMoney(current);
            if (progress < 1) window.requestAnimationFrame(step);
            else obj.innerText = formatMoney(end);
        };
        window.requestAnimationFrame(step);
    }

    // 🚀 V11_google版：絕對真實市場價格版 (無視除權息與分割)
    async function loadHistoryData() {
        isHistoryLoaded = true;
        const statusEl = document.getElementById('history-status');
        const progressContainer = document.getElementById('history-progress-container');
        const progressBar = document.getElementById('history-progress');
        
        statusEl.innerText = "啟動華爾街多重路由，抓取真實市場報價...";
        progressContainer.style.display = 'block';
        appData.history = [];
        
        const allStocks = [
            ...appData.twStocks.map(s => ({...s, market: 'TW'})), 
            ...appData.usStocks.map(s => ({...s, market: 'US'}))
        ];
        
        const total = allStocks.length;
        let current = 0;

        const proxies = [
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
        ];

        for (let stock of allStocks) {
            await sleep(600); 
            const yfSymbol = stock.market === 'TW' ? `${stock.symbol}.TW` : stock.symbol;
            const ts = new Date().getTime();
            
            // 💎 極簡網址：移除 events=div，只要最純粹的歷史 K 線
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${yfSymbol}?interval=1d&range=6mo&nocache=${ts}`;
            
            let fetchSuccess = false;

            for (let proxyGen of proxies) {
                if (fetchSuccess) break;
                try {
                    const res = await fetch(proxyGen(targetUrl));
                    if (!res.ok) continue;
                    const data = await res.json();
                    
                    const currentPrice = stock.currentPrice;
                    const previousClose = stock.prevClose;
                    
                    // 💎 唯一真理：只抓取「原始未還原收盤價 (close)」，無視 adjclose
                    const rawCloses = data.chart.result[0].indicators.quote[0].close;
                    const klines = rawCloses.filter(c => c !== null && c !== undefined); 
                    
                    if (currentPrice && klines.length > 5) {
                        
                        // 計算純粹的市場價差
                        const getRawPerformance = (tradingDays) => {
                            if (klines.length < 2) return { pct: 0, profit: 0 };
                            
                            const pastIndex = Math.max(0, klines.length - 1 - tradingDays);
                            const pastPrice = klines[pastIndex];
                            
                            if (!pastPrice) return { pct: 0, profit: 0 };

                            // 完全不管配息或分割，就是單純的：(現價 - 過去價)
                            let profit = (currentPrice - pastPrice) * stock.shares;
                            let pct = ((currentPrice - pastPrice) / pastPrice) * 100;

                            return { pct, profit };
                        };

                        // 取得 5 個交易日與 22 個交易日的絕對真實績效
                        const d5Data = getRawPerformance(5);
                        const d22Data = getRawPerformance(22);

                        // 1日損益維持使用首頁抓到的精準昨收
                        let dailyProfit = 0;
                        let d1Return = 0;
                        if (previousClose) {
                            dailyProfit = (currentPrice - previousClose) * stock.shares;
                            d1Return = ((currentPrice - previousClose) / previousClose) * 100;
                        }

                        if (stock.market === 'US') {
                            dailyProfit *= appData.settings.usdToTwd;
                            d22Data.profit *= appData.settings.usdToTwd;
                        }
                        
                        appData.history.push({
                            symbol: stock.symbol,
                            d1: d1Return,
                            d5: d5Data.pct,
                            d22: d22Data.pct,
                            dailyProfitNTD: dailyProfit,
                            m1ProfitNTD: d22Data.profit 
                        });
                        fetchSuccess = true; 
                    }
                } catch(e) { continue; }
            }
            
            current++;
            progressBar.style.width = `${(current / total) * 100}%`;
            statusEl.innerText = `計算市場真實波動 ${current}/${total}...`;
        }
        
        progressContainer.style.display = 'none';
        statusEl.innerText = "波動矩陣運算完成";
        renderHistory();
    }

    function setHeroMode(mode, btnEl) {
        currentHeroMode = mode;
        document.querySelectorAll('.history-controls .hero-btn').forEach(btn => btn.classList.remove('active-hero'));
        btnEl.classList.add('active-hero');
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('history-list-container');
        if(appData.history.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 20px; color:var(--text-muted);">無歷史數據或載入失敗</div>';
            return;
        }
        let displayData = [...appData.history];
        if (currentHeroMode === 'd1Pct') displayData.sort((a, b) => b.d1 - a.d1);
        else if (currentHeroMode === 'd1Profit') displayData.sort((a, b) => b.dailyProfitNTD - a.dailyProfitNTD);
        else if (currentHeroMode === 'd22Profit') displayData.sort((a, b) => b.m1ProfitNTD - a.m1ProfitNTD);

        const formatPct = (val) => `<span class="${getColorClass(val)}">${formatPercent(val)}</span>`;
        const formatProfit = (val) => `<span class="${getColorClass(val)}">${val > 0 ? '+' : ''}${formatMoney(val)}</span>`;

        // ✅ 計算月損益與日損益的總合計（所有個股加總，與排序無關）
        const totalM1  = appData.history.reduce((sum, item) => sum + item.m1ProfitNTD,    0);
        const totalDay = appData.history.reduce((sum, item) => sum + item.dailyProfitNTD, 0);
        const m1Color  = totalM1  > 0 ? 'color:var(--up-red)' : totalM1  < 0 ? 'color:var(--down-green)' : 'color:var(--text-navy)';
        const dayColor = totalDay > 0 ? 'color:var(--up-red)' : totalDay < 0 ? 'color:var(--down-green)' : 'color:var(--text-navy)';

        let html = `
            <div class="history-grid" style="color:var(--text-muted); border-bottom: 2px solid var(--border-light); padding-bottom: 8px; align-items: flex-end;">
                <div class="col-name">代號</div><div>1日(%)</div><div>5日(%)</div><div>22日(%)</div>
                <div style="text-align:right; line-height:1.4;">
                    月損益
                    <div class="num" style="font-size:12px; font-weight:700; margin-top:4px; ${m1Color}">
                        ${totalM1 > 0 ? '+' : ''}${formatMoney(totalM1)}
                    </div>
                </div>
                <div style="text-align:right; line-height:1.4;">
                    日損益
                    <div class="num" style="font-size:12px; font-weight:700; margin-top:4px; ${dayColor}">
                        ${totalDay > 0 ? '+' : ''}${formatMoney(totalDay)}
                    </div>
                </div>
            </div>`;

        displayData.forEach(item => {
            const d1W = currentHeroMode === 'd1Pct' ? 'font-weight:700; font-size:13px;' : '';
            const d1P = currentHeroMode === 'd1Profit' ? 'font-weight:700; font-size:13px;' : 'font-weight:600;';
            const d22P = currentHeroMode === 'd22Profit' ? 'font-weight:700; font-size:13px;' : '';
            
            html += `
                <div class="history-grid">
                    <div class="col-name num">${item.symbol}</div>
                    <div class="num" style="${d1W}">${formatPct(item.d1)}</div>
                    <div class="num">${formatPct(item.d5)}</div>
                    <div class="num">${formatPct(item.d22)}</div>
                    <div class="num" style="text-align:right; ${d22P}">${formatProfit(item.m1ProfitNTD)}</div>
                    <div class="num" style="text-align:right; ${d1P}">${formatProfit(item.dailyProfitNTD)}</div>
                </div>`;
        });

        container.innerHTML = html;
    }

    window.onload = refreshData;
</script>
</body>
</html>
